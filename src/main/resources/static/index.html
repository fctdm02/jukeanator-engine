<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JukeANator</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>JukeANator</h1>
    <div id="authBox">
      <span id="authStatus">Not logged in</span>
      <button id="loginBtn">Log in</button>
      <button id="logoutBtn" hidden>Log out</button>
    </div>
  </header>

  <section id="nowPlaying">
    <h2>Now Playing</h2>
    <div id="nowPlayingContent">Nothing playing</div>
    <div id="playbackStatus"></div>
    <div id="adminPlayerControls" hidden>
      <button id="pauseBtn">Pause</button>
      <button id="nextBtn">Next</button>
      <button id="stopBtn">Stop</button>
    </div>
  </section>

  <nav>
    <button class="tab-btn" data-tab="popularTab">Popular</button>
    <button class="tab-btn" data-tab="searchTab">Search</button>
    <button class="tab-btn" data-tab="genresTab">Genres</button>
    <button class="tab-btn" data-tab="queueTab">Queue</button>
  </nav>

  <main>
    <section id="popularTab" class="tab"></section>

    <section id="searchTab" class="tab" hidden>
      <input id="searchInput" placeholder="Search artists, albums, songs...">
      <button id="searchBtn">Search</button>
      <div id="searchResults"></div>
    </section>

    <section id="genresTab" class="tab" hidden>
      <div id="genreList"></div>
      <div id="genreAlbums"></div>
    </section>

    <section id="queueTab" class="tab" hidden>
      <div id="adminQueueControls" hidden>
        <button id="randomizeBtn">Randomize</button>
        <button id="flushBtn">Flush</button>
      </div>
      <ol id="queueList"></ol>
    </section>
  </main>

  <dialog id="loginDialog">
    <form id="loginForm">
      <label>Email <input type="email" id="loginEmail" required></label>
      <label>Password <input type="password" id="loginPassword" required></label>
      <button type="submit">Log in</button>
      <button type="button" id="loginCancelBtn">Cancel</button>
      <button type="button" id="showRegisterBtn">Create Account</button>
    </form>
  </dialog>

  <dialog id="registerDialog">
    <form id="registerForm">
      <label>First name <input type="text" id="registerFirstName" required></label>
      <label>Last name <input type="text" id="registerLastName" required></label>
      <label>Email <input type="email" id="registerEmail" required></label>
      <label>Password <input type="password" id="registerPassword" required></label>
      <button type="submit">Register</button>
      <button type="button" id="registerCancelBtn">Cancel</button>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
